<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="options.css">
    <style>
        body {
            width: 320px;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f8fafc;
        }

        .popup-container {
            padding: 1.25rem;
        }

        .limit-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            padding: 1rem;
            margin-bottom: 1.25rem;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: #f1f5f9;
            border-radius: 999px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background-color: #3b82f6;
            border-radius: 999px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.625rem 1.25rem;
            background-color: #2563eb;
            color: white;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
        }

        .btn-autofill {
            width: 100%;
            padding: 0.75rem;
            background-color: #2563eb;
            color: white;
            border-radius: 0.5rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .btn-autofill:hover {
            background-color: #1d4ed8;
            transform: translateY(-1px);
        }

        .btn-autofill:active {
            transform: translateY(0);
        }

        .btn-autofill:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            padding: 0;
        }

        .btn-icon:hover {
            background: #eff6ff;
            color: #2563eb;
        }

        .btn-icon:active {
            transform: scale(0.93);
        }
    </style>
</head>

<body>
    <div class="popup-container">
        <header class="flex items-center justify-between mb-4 px-1">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-blue-600"></div>
                <h1 class="text-base font-bold text-slate-900 m-0">Autofill Genius AI</h1>
            </div>
            <div class="flex items-center gap-1.5">
                <!-- Sidebar button -->
                <button id="sidebar-btn" class="btn-icon" title="Open Settings in Sidebar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <line x1="9" y1="3" x2="9" y2="21" />
                    </svg>
                </button>
                <!-- Options button -->
                <button id="options-btn" class="btn-icon" title="Open Settings in Tab">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </button>
            </div>
        </header>

        <div id="login-required" class="text-center py-4">
            <p class="text-sm text-slate-500 mb-4" style="margin-bottom: 20px;">Login required to use Autofill Genius AI.</p>
            <button id="login-settings-btn" class="btn-primary">
                Login
            </button>
        </div>

        <div id="popup-content" class="hidden">
            <div id="account-info" class="limit-card" style="padding: 14px;">
                <!-- Header: Avatar, Info -->
                <div class="flex items-center justify-between mb-3 border-b border-slate-100 pb-3">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="shrink-0 w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </div>
                        <div class="flex flex-col min-w-0">
                            <p id="popup-shop" class="text-[13px] font-bold text-slate-900 truncate m-0 leading-tight"></p>
                        </div>
                    </div>
                </div>

                <!-- Plan & Balance row -->
                <div class="flex flex-row gap-2 mb-3">
                    <div class="flex-1 bg-slate-50 rounded-xl border border-slate-100 p-2 flex flex-col justify-center min-w-0">
                        <span class="text-[9px] text-slate-500 font-bold uppercase tracking-wide">Plan</span>
                        <span id="popup-plan" class="text-[11px] font-bold text-blue-600 truncate mt-0.5 block">Trial</span>
                    </div>
                    <div class="flex-1 bg-emerald-50 rounded-xl border border-emerald-100 p-2 flex flex-row items-center justify-between min-w-0 pr-2">
                        <div class="flex flex-col min-w-0 pr-1">
                            <span class="text-[9px] text-emerald-600 font-bold uppercase tracking-wide">Balance</span>
                            <span id="popup-balance" class="text-[13px] font-bold text-emerald-700 truncate mt-0.5 block">0 ৳</span>
                        </div>
                        <a id="add-balance-btn" href="#" target="_blank" class="shrink-0 w-6 h-6 bg-white border border-emerald-100 rounded-md flex items-center justify-center text-emerald-600 hover:bg-emerald-100 transition-colors shadow-sm" title="Add Balance">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </a>
                    </div>
                </div>

                <div id="popup-limits" class="space-y-1">
                    <!-- Loaded by JS -->
                </div>
            </div>

            <div class="flex flex-col gap-2 mt-4">
                <button id="autofill-btn" class="btn-autofill" style="margin: 0;">
                    Autofill Form Now
                </button>
                <button id="new-profile-btn" class="btn-primary w-full"
                    style="width: 100%; box-sizing: border-box; background-color: #f8fafc; color: #334155; border: 1px solid #cbd5e1; box-shadow: none;">
                    + Create New Profile
                </button>
            </div>

            <p class="text-[10px] text-center text-slate-400 mt-4 leading-relaxed">
                Requests are processed via <b>Nex IT Solution</b> server.<br>
                Limit will be deducted on success.
            </p>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="popup.js"></script>
</body>

</html>
